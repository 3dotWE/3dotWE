<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiler</title>

<style>


*{
    box-sizing:border-box;
}

:root{
    --green:#33ff33;
    --dark:#010401;
    --panel:#021002;
    --border:#22ff22;
}

body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:
        radial-gradient(circle at center,#062006 0%,#010401 70%);
    color:var(--green);
    font-family:'Courier New', Courier, monospace;
    display:flex;
    flex-direction:column;
    text-shadow:0 0 6px rgba(51,255,51,0.7);
    letter-spacing:1px;
}

/* CRT Scanlines */
body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,0.04) 0px,
            rgba(255,255,255,0.04) 1px,
            transparent 2px,
            transparent 4px
        );
    z-index:9999;
}

/* CRT Vignette */
body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        radial-gradient(circle,
        transparent 45%,
        rgba(0,0,0,0.65) 100%);
    z-index:9998;
}

header{
    background:rgba(0,15,0,0.95);
    border-bottom:2px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 18px;
    box-shadow:0 0 20px rgba(51,255,51,0.25);
}

h1{
    margin:0;
    font-size:30px;
    font-weight:normal;
}

.cursor{
    animation:blink 1s steps(2,start) infinite;
}

@keyframes blink{
    0%,45%{
        opacity:1;
    }
    46%,100%{
        opacity:0;
    }
}

.controls{
    display:flex;
    gap:10px;
}

button{
    background:#001200;
    color:var(--green);
    border:1px solid var(--border);
    padding:10px 16px;
    cursor:pointer;
    font-family:'Courier New', Courier, monospace;
    font-size:16px;
    transition:0.15s;
    text-transform:uppercase;
    box-shadow:
        inset 0 0 10px rgba(51,255,51,0.15),
        0 0 10px rgba(51,255,51,0.2);
}

button:hover{
    background:var(--green);
    color:black;
    text-shadow:none;
}

main{
    flex:1;
    display:grid;
    grid-template-columns:1fr 1fr;
    min-height:0;
}

.editor{
    display:flex;
    flex-direction:column;
    border-right:2px solid var(--border);
    min-height:0;
}

.tabs{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    background:#001000;
    border-bottom:1px solid var(--border);
}

.tab{
    border-top:none;
    border-left:none;
    border-bottom:none;
    border-right:1px solid var(--border);
}

.tab.active{
    background:var(--green);
    color:black;
    text-shadow:none;
}

textarea{
    flex:1;
    width:100%;
    resize:none;
    border:none;
    outline:none;
    background:rgba(0,5,0,0.97);
    color:var(--green);
    padding:18px;
    font-family:'Courier New', Courier, monospace;
    font-size:16px;
    line-height:1.25;
    display:none;
    caret-color:var(--green);
}

textarea.active{
    display:block;
}

.preview{
    display:flex;
    flex-direction:column;
    min-height:0;
    background:black;
}

.preview-title{
    background:#001000;
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    font-size:16px;
}

iframe{
    flex:1;
    width:100%;
    border:none;
    background:white;
}

.status{
    background:#001000;
    border-top:1px solid var(--border);
    padding:8px 12px;
    color:#1eff1e;
    font-size:20px;
}

@media(max-width:900px){

    main{
        grid-template-columns:1fr;
        grid-template-rows:1fr 1fr;
    }

    .editor{
        border-right:none;
        border-bottom:2px solid var(--border);
    }
}
</style>
</head>

<body>

<header>
    <h1>COMPILER<span class="cursor">_</span></h1>

    <div class="controls">
        <button onclick="runCode()">Run</button>
        <button onclick="fullscreenPreview()">Fullscreen</button>
    </div>
</header>

<main>

<section class="editor">

<div class="tabs">
    <button class="tab active" onclick="showTab('html')">HTML</button>
    <button class="tab" onclick="showTab('css')">CSS</button>
    <button class="tab" onclick="showTab('js')">JS</button>
</div>

<textarea id="html" class="active"><h1>Compiler Online</h1>

<p>This runs inside about:blank.</p>

<button onclick="hello()">Execute</button></textarea>

<textarea id="css">body{
    background:black;
    color:#33ff33;
    font-family:'Courier New',monospace;
    padding:30px;
}

h1{
    text-shadow:0 0 10px #33ff33;
}

button{
    background:black;
    color:#33ff33;
    border:1px solid #33ff33;
    padding:10px 15px;
}</textarea>

<textarea id="js">function hello(){
    alert("SYSTEM READY");
}</textarea>

</section>

<section class="preview">
    <div class="preview-title">
        > OUTPUT<span class="cursor">_</span>
    </div>

    <iframe id="preview"></iframe>

    <div class="status">
        STATUS: READY | TARGET: about:blank
    </div>
</section>

</main>

<script>

function showTab(name){

    document.querySelectorAll("textarea").forEach(t=>{
        t.classList.remove("active");
    });

    document.querySelectorAll(".tab").forEach(t=>{
        t.classList.remove("active");
    });

    document.getElementById(name).classList.add("active");

    const tabs=document.querySelectorAll(".tab");

    if(name==="html") tabs[0].classList.add("active");
    if(name==="css") tabs[1].classList.add("active");
    if(name==="js") tabs[2].classList.add("active");
}

function buildPage(){

    const html=document.getElementById("html").value;
    const css=document.getElementById("css").value;
    const js=document.getElementById("js").value;

    return `
<!DOCTYPE html>
<html>
<head>
<style>
${css}
</style>
</head>

<body>

${html}

<script>
${js}
<\/script>

</body>
</html>
`;
}

function runCode(){

    const page=buildPage();

    document.getElementById("preview").srcdoc=page;

    const win=window.open("about:blank","_blank");

    if(win){

        win.document.open();
        win.document.write(page);
        win.document.close();

    }else{

        alert("Popup blocked.");
    }
}

function fullscreenPreview(){

    const preview=document.querySelector(".preview");

    if(!document.fullscreenElement){

        preview.requestFullscreen();

    }else{

        document.exitFullscreen();
    }
}

window.onload=()=>{

    document.getElementById("preview").srcdoc=buildPage();
};

</script>

</body>
</html>
