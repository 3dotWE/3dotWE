<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading....</title>
<script>document.title="Loading....";</script>
<style>
*{box-sizing:border-box}
:root{
--green:#33ff33;
--border:#22ff22;
--panel:#001000;
--dim:#178817;
--bg:#000;
}
body{
margin:0;
min-height:100vh;
background:var(--bg);
color:var(--green);
font-family:"Courier New",monospace;
display:flex;
flex-direction:column;
}
header{
padding:14px 18px;
border-bottom:2px solid var(--border);
background:var(--panel);
display:flex;
flex-wrap:wrap;
gap:12px;
align-items:center;
justify-content:space-between;
}
h1{margin:0;font-size:22px;font-weight:normal}
.sub{font-size:12px;color:var(--dim)}
.toolbar{display:flex;gap:10px;flex:1;min-width:220px;max-width:520px}
input,button{
font-family:inherit;
font-size:14px;
}
#search{
flex:1;
background:#000;
color:var(--green);
border:1px solid var(--border);
padding:10px 12px;
outline:none;
}
#search:focus{box-shadow:0 0 8px rgba(51,255,51,.35)}
button{
background:var(--panel);
color:var(--green);
border:1px solid var(--border);
padding:10px 14px;
cursor:pointer;
}
button:hover{background:var(--green);color:#000}
#status{
padding:8px 18px;
font-size:12px;
color:var(--dim);
border-bottom:1px solid #113311;
}
main{
flex:1;
display:grid;
grid-template-columns:320px 1fr;
min-height:0;
}
@media(max-width:900px){
main{grid-template-columns:1fr;grid-template-rows:240px 1fr}
}
#list{
overflow:auto;
border-right:1px solid var(--border);
padding:10px;
}
.game{
display:block;
width:100%;
text-align:left;
padding:10px 12px;
margin-bottom:6px;
background:#000900;
border:1px solid #1a3a1a;
color:var(--green);
cursor:pointer;
font-size:13px;
}
.game:hover,.game.active{
background:var(--green);
color:#000;
border-color:var(--green);
}
#player{
display:flex;
flex-direction:column;
min-height:0;
background:#010101;
}
#playerHead{
padding:10px 14px;
border-bottom:1px solid var(--border);
font-size:12px;
word-break:break-all;
}
#frame{
flex:1;
border:0;
width:100%;
background:#000;
min-height:360px;
}
.empty{
padding:24px;
color:var(--dim);
line-height:1.6;
}
a{color:var(--green)}
</style>
</head>
<body>
<header>
<div>
<h1>&gt; FILES_</h1>
<div class="sub">local games/ first · CDN fallback (githack)</div>
</div>
<div class="toolbar">
<input id="search" type="search" placeholder="search games..." autocomplete="off" spellcheck="false">
<button type="button" id="reload">Reload list</button>
<button type="button" id="openTab">Open tab</button>
</div>
</header>
<div id="status">Loading game index...</div>
<main>
<div id="list"></div>
<section id="player">
<div id="playerHead">Pick a game from the list.</div>
<iframe id="frame" title="Game"></iframe>
</section>
</main>
<script>
const CACHE_KEY = "filesGameListV2";
let cdnBase = "https://rawcdn.githack.com/ShadowDevLabs/files/main";
let games = [];
let selected = "";
const localGames = new Set();

async function loadConfig(){
try{
const res = await fetch(new URL("../files-config.json", location.href).href, {cache:"no-store"});
if(res.ok){
const cfg = await res.json();
if(cfg.cdn) cdnBase = cfg.cdn.replace(/\/$/, "");
}
}catch{}
}

async function loadLocalManifest(){
localGames.clear();
try{
const res = await fetch(new URL("games/manifest.json", location.href).href, {cache:"no-store"});
if(!res.ok) return;
const data = await res.json();
for(const id of data.games || []){
localGames.add(id);
}
}catch{}
}

function cdnGameUrl(id){
return cdnBase + "/" + id + "/index.html";
}

function localGameUrl(id){
return new URL("games/" + id + "/index.html", location.href).href;
}

async function resolveGameUrl(id){
if(localGames.has(id)) return localGameUrl(id);

try{
const local = localGameUrl(id);
const head = await fetch(local, {method: "HEAD"});
if(head.ok){
localGames.add(id);
return local;
}
}catch{}

return cdnGameUrl(id);
}

function formatName(id){
return id.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function setStatus(msg){
document.getElementById("status").textContent = msg;
}

async function fetchAllGames(){
const cached = localStorage.getItem(CACHE_KEY);
if(cached){
try{
const parsed = JSON.parse(cached);
if(Array.isArray(parsed) && parsed.length) return parsed;
}catch{}
}

setStatus("Fetching game index from GitHub (one-time, then cached)...");

const commitRes = await fetch("https://api.github.com/repos/ShadowDevLabs/files/commits/main", {
headers: {Accept: "application/vnd.github+json"}
});

if(!commitRes.ok){
throw new Error("GitHub API " + commitRes.status + " — try again later");
}

const commit = await commitRes.json();
const treeSha = commit.commit.tree.sha;
const treeRes = await fetch(
"https://api.github.com/repos/ShadowDevLabs/files/git/trees/" + treeSha + "?recursive=1",
{headers: {Accept: "application/vnd.github+json"}}
);

if(!treeRes.ok){
throw new Error("GitHub tree API " + treeRes.status);
}

const tree = await treeRes.json();
const out = new Set();

for(const item of tree.tree || []){
if(item.path && item.path.endsWith("/index.html")){
out.add(item.path.split("/")[0]);
}
}

const list = [...out].sort((a,b) => a.localeCompare(b));
localStorage.setItem(CACHE_KEY, JSON.stringify(list));
return list;
}

function renderList(filter=""){
const list = document.getElementById("list");
const q = filter.trim().toLowerCase();
const shown = q ? games.filter(g => g.toLowerCase().includes(q)) : games;

list.innerHTML = "";

if(!shown.length){
list.innerHTML = '<div class="empty">No games match.</div>';
return;
}

const frag = document.createDocumentFragment();
const cap = q ? shown.length : Math.min(shown.length, 400);

for(let i = 0; i < cap; i++){
const id = shown[i];
const btn = document.createElement("button");
btn.type = "button";
btn.className = "game" + (id === selected ? " active" : "");
btn.textContent = (localGames.has(id) ? "● " : "") + formatName(id);
btn.dataset.id = id;
btn.addEventListener("click", () => playGame(id));
frag.appendChild(btn);
}

list.appendChild(frag);

if(!q && shown.length > cap){
const more = document.createElement("div");
more.className = "empty";
more.textContent = "Showing first " + cap + " of " + shown.length + ". Search to narrow down.";
list.appendChild(more);
}
}

async function playGame(id){
selected = id;
const url = await resolveGameUrl(id);
const isLocal = url.startsWith(location.origin);
const frame = document.getElementById("frame");

document.getElementById("playerHead").textContent = url + (isLocal ? " · local" : " · CDN");

if(isLocal){
frame.src = url;
setStatus("Playing (local): " + formatName(id));
}else{
frame.removeAttribute("src");
frame.src = "about:blank";
window.open(url, "_blank", "noopener,noreferrer");
setStatus("Opened in new tab (CDN): " + formatName(id));
}

renderList(document.getElementById("search").value);
}

document.getElementById("search").addEventListener("input", e => renderList(e.target.value));

document.getElementById("openTab").addEventListener("click", async () => {
if(!selected) return;
window.open(await resolveGameUrl(selected), "_blank", "noopener,noreferrer");
});

document.getElementById("reload").addEventListener("click", async () => {
localStorage.removeItem(CACHE_KEY);
await boot(true);
});

async function boot(force){
try{
await loadConfig();
await loadLocalManifest();
games = await fetchAllGames();
if(localGames.size){
const merged = new Set([...games, ...localGames]);
games = [...merged].sort((a,b) => a.localeCompare(b));
}
document.title = "Files";
const localNote = localGames.size ? " · " + localGames.size + " local" : "";
setStatus(games.length + " games · CDN: githack" + localNote);
renderList();
}catch(err){
document.title = "Files";
setStatus("Error: " + err.message);
document.getElementById("list").innerHTML =
'<div class="empty">Could not load index.<br><br>' +
'<a href="' + cdnGameUrl("2048") + '" target="_blank" rel="noopener">Try 2048 (CDN)</a><br>' +
'Or run: <code>./scripts/pull-files-chunk.sh 2048</code></div>';
}
}

boot(false);
</script>
</body>
</html>
