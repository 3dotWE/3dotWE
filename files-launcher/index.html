<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<title>Loading....</title>
<script>
if(location.protocol==="http:"&&location.hostname!=="localhost"&&location.hostname!=="127.0.0.1"){
location.replace("https://"+location.host+location.pathname+location.search+location.hash);
}
document.title="Loading....";
</script>
<style>
*{box-sizing:border-box}
:root{
--green:#33ff33;
--border:#22ff22;
--panel:#001000;
--dim:#178817;
--bg:#000;
}
body{
margin:0;
min-height:100vh;
background:var(--bg);
color:var(--green);
font-family:"Courier New",monospace;
display:flex;
flex-direction:column;
}
header{
padding:14px 18px;
border-bottom:2px solid var(--border);
background:var(--panel);
display:flex;
flex-wrap:wrap;
gap:12px;
align-items:center;
justify-content:space-between;
}
h1{margin:0;font-size:22px;font-weight:normal}
.sub{font-size:12px;color:var(--dim)}
.toolbar{display:flex;gap:10px;flex:1;min-width:220px;max-width:520px}
input,button{font-family:inherit;font-size:14px}
#search{
flex:1;
background:#000;
color:var(--green);
border:1px solid var(--border);
padding:10px 12px;
outline:none;
}
button{
background:var(--panel);
color:var(--green);
border:1px solid var(--border);
padding:10px 14px;
cursor:pointer;
}
button:hover{background:var(--green);color:#000}
#status{
padding:8px 18px;
font-size:12px;
color:var(--dim);
border-bottom:1px solid #113311;
}
main{
flex:1;
display:grid;
grid-template-columns:320px 1fr;
min-height:0;
}
@media(max-width:900px){
main{grid-template-columns:1fr;grid-template-rows:240px 1fr}
}
#list{overflow:auto;border-right:1px solid var(--border);padding:10px}
.game{
display:block;width:100%;text-align:left;padding:10px 12px;margin-bottom:6px;
background:#000900;border:1px solid #1a3a1a;color:var(--green);cursor:pointer;font-size:13px;
}
.game:hover,.game.active{background:var(--green);color:#000;border-color:var(--green)}
#player{display:flex;flex-direction:column;min-height:0;background:#010101}
#playerHead{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;word-break:break-all}
#frame{flex:1;border:0;width:100%;background:#000;min-height:360px}
#playerHint{
padding:12px 14px;
color:var(--dim);
font-size:12px;
line-height:1.5;
display:none;
}
.empty{padding:24px;color:var(--dim);line-height:1.6}
</style>
</head>
<body>
<header>
<div>
<h1>&gt; FILES_</h1>
<div class="sub" id="modeLabel">checking source...</div>
</div>
<div class="toolbar">
<input id="search" type="search" placeholder="search games..." autocomplete="off" spellcheck="false">
<button type="button" id="openTab">Open tab</button>
</div>
</header>
<div id="status">Loading...</div>
<main>
<div id="list"></div>
<section id="player">
<div id="playerHead">Pick a game from the list.</div>
<div id="playerHint">Games from 3wefiles.dpdns.org + same-origin cloak on 3we.dpdns.org (Unity/embeds proxied). Needs HTTPS.</div>
<iframe id="frame" title="Game" allow="fullscreen; autoplay; encrypted-media; gamepad; pointer-lock"></iframe>
</section>
</main>
<script src="cloak-config.js"></script>
<script src="game-profiles.js"></script>
<script src="game-loaders.js"></script>
<script src="cloak.js"></script>
<script>
let games = [];
let selected = "";
let useLocalFiles = false;
let useGamesSite = false;

function localGameUrl(id){
return new URL("../files/" + id + "/index.html", location.href).href;
}

function formatName(id){
return id.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function setStatus(msg){
document.getElementById("status").textContent = msg;
}

async function detectLocalFiles(){
try{
const probe = localGameUrl("2048");
const res = await fetch(probe, {method: "HEAD", cache: "no-store"});
return res.ok;
}catch{
return false;
}
}

async function detectGamesSite(){
try{
return await FilesCloak.probeGamesSite();
}catch{
return false;
}
}

async function resolveGameUrl(id){
return {url: FilesCloak.cloakPlayUrl(id), mode: "play", label: "play"};
}

async function loadManifest(){
const res = await fetch(new URL("manifest.json", location.href).href, {cache: "no-store"});
if(!res.ok) throw new Error("manifest.json missing");
const data = await res.json();
return data.games || [];
}

function renderList(filter=""){
const list = document.getElementById("list");
const q = filter.trim().toLowerCase();
const shown = q ? games.filter(g => g.toLowerCase().includes(q)) : games;
list.innerHTML = "";
if(!shown.length){
list.innerHTML = '<div class="empty">No games match.</div>';
return;
}
const cap = q ? shown.length : Math.min(shown.length, 500);
const frag = document.createDocumentFragment();
for(let i = 0; i < cap; i++){
const id = shown[i];
const btn = document.createElement("button");
btn.type = "button";
btn.className = "game" + (id === selected ? " active" : "");
btn.textContent = formatName(id);
btn.addEventListener("click", () => playGame(id));
frag.appendChild(btn);
}
list.appendChild(frag);
if(!q && shown.length > cap){
const more = document.createElement("div");
more.className = "empty";
more.textContent = "Showing " + cap + " of " + shown.length + ". Search to narrow.";
list.appendChild(more);
}
}

async function playGame(id){
selected = id;
const frame = document.getElementById("frame");
const hint = document.getElementById("playerHint");

try{
hint.style.display = useLocalFiles ? "none" : "block";
const hit = await FilesCloak.loadGameIntoFrame(frame, id);
let srcLabel = hit.mode;
if(hit.mode === "games-site") srcLabel = "3wefiles";
else if(useLocalFiles && hit.mode === "cloak-sw") srcLabel = "local+cloak";
else if(hit.label && hit.label.startsWith("jsdelivr-own")) srcLabel = "3.we-files";
document.getElementById("playerHead").textContent = hit.url + " · " + srcLabel;
setStatus("Playing (" + srcLabel + " · " + (hit.category || FilesCloak.getCategory(id)) + "): " + formatName(id));
}catch(err){
frame.removeAttribute("srcdoc");
frame.src = "about:blank";
document.getElementById("playerHead").textContent = "Load failed";
const msg = err.message || "Failed to load game";
setStatus(msg + (location.protocol==="http:" ? " · use https://3we.dpdns.org" : ""));
}
renderList(document.getElementById("search").value);
}

document.getElementById("search").addEventListener("input", e => renderList(e.target.value));
document.getElementById("openTab").addEventListener("click", async () => {
if(!selected) return;
const {url} = await resolveGameUrl(selected);
window.open(url, "_blank", "noopener,noreferrer");
});

(async function boot(){
try{
useLocalFiles = await detectLocalFiles();
useGamesSite = await detectGamesSite();
await FilesCloak.resetStaleServiceWorkers();

let mode = "cloak · 3dotWE/3.we-files";
if(useLocalFiles) mode = "local files/ + cloak";
else if(useGamesSite) mode = "3wefiles.dpdns.org + cloak";
else mode = "jsDelivr · 3dotWE/3.we-files (3wefiles HTTPS pending)";

document.getElementById("modeLabel").textContent = mode;
games = await loadManifest();
document.title = "Files";
setStatus(games.length + " games · " + mode);
renderList();
}catch(err){
document.title = "Files";
setStatus(err.message);
document.getElementById("list").innerHTML = '<div class="empty">' + err.message + "</div>";
}
})();
</script>
</body>
</html>
