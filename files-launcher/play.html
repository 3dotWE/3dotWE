<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading....</title>
<script>document.title="Loading....";</script>
<style>
*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
background:#000;
color:#33ff33;
font-family:"Courier New",monospace;
display:flex;
flex-direction:column;
}
header{
padding:10px 14px;
border-bottom:1px solid #22ff22;
background:#001000;
font-size:12px;
display:flex;
justify-content:space-between;
gap:10px;
align-items:center;
}
#title{font-size:14px}
#meta{color:#178817;word-break:break-all}
button{
background:#001000;
color:#33ff33;
border:1px solid #22ff22;
padding:8px 12px;
cursor:pointer;
font-family:inherit;
}
button:hover{background:#33ff33;color:#000}
#frame{flex:1;border:0;width:100%;background:#000;min-height:0}
#status{padding:10px 14px;color:#178817;font-size:12px}
</style>
</head>
<body>
<header>
<div>
<div id="title">&gt; PLAY_</div>
<div id="meta">resolving mirror...</div>
</div>
<button type="button" id="back">Back to list</button>
</header>
<div id="status">Cloaked route active · same-origin shell</div>
<iframe id="frame" title="Game" allow="fullscreen; autoplay; encrypted-media; gamepad; pointer-lock"></iframe>
<script src="cloak-config.js"></script>
<script src="cloak.js"></script>
<script>
function qp(name){
return new URL(location.href).searchParams.get(name);
}

function formatName(id){
return id.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

document.getElementById("back").addEventListener("click", () => {
location.href = "index.html";
});

(async function boot(){
const id = qp("g");
if(!id){
document.getElementById("meta").textContent = "missing ?g=game-id";
document.getElementById("status").textContent = "No game selected.";
return;
}

document.getElementById("title").textContent = "> " + formatName(id);
document.title = formatName(id);

await FilesCloak.ensureServiceWorker();

try{
const hit = await FilesCloak.loadGameIntoFrame(document.getElementById("frame"), id);
document.getElementById("meta").textContent = location.origin + location.pathname + "?g=" + id + " · " + hit.label;
document.getElementById("status").textContent = "Playing via cloaked mirror (" + hit.label + ")";
}catch(err){
document.getElementById("meta").textContent = err.message || "Load failed";
document.getElementById("status").textContent = "Could not load game.";
}
})();
</script>
</body>
</html>
