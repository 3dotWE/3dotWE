<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiler</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2250%22 font-size=%2250%22>🌐</text></svg>">

<style>
*{box-sizing:border-box}

:root{
--green:#33ff33;
--border:#22ff22;
--panel:#001000;
}

body{
margin:0;
height:100vh;
overflow:hidden;
background:#000;
color:var(--green);
font-family:"Courier New",monospace;
display:flex;
flex-direction:column;
text-shadow:0 0 6px rgba(51,255,51,.7);
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.04) 0px,
rgba(255,255,255,.04) 1px,
transparent 2px,
transparent 4px
);
z-index:9999;
}

header{
background:var(--panel);
border-bottom:2px solid var(--border);
padding:12px 18px;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-size:32px;
font-weight:normal;
}

.cursor{
animation:blink 1s steps(2,start) infinite;
}

@keyframes blink{
0%,45%{opacity:1}
46%,100%{opacity:0}
}

.controls{
display:flex;
gap:10px;
}

button{
background:#001000;
color:var(--green);
border:1px solid var(--border);
padding:10px 16px;
cursor:pointer;
font-family:"Courier New",monospace;
}

button:hover{
background:var(--green);
color:#000;
text-shadow:none;
}

.workspace{
flex:1;
display:grid;
grid-template-rows:1fr 220px;
min-height:0;
}

.editor-preview{
display:grid;
grid-template-columns:1fr 1fr;
min-height:0;
}

.editor{
display:flex;
flex-direction:column;
border-right:2px solid var(--border);
}

.tabs{
display:grid;
grid-template-columns:repeat(3,1fr);
}

.tab.active{
background:var(--green);
color:#000;
}

textarea{
flex:1;
background:#000;
color:var(--green);
border:none;
outline:none;
resize:none;
padding:16px;
font-family:"Courier New",monospace;
font-size:16px;
display:none;
}

textarea.active{
display:block;
}

.preview{
display:flex;
flex-direction:column;
}

.preview-title{
padding:10px 14px;
border-bottom:1px solid var(--border);
background:var(--panel);
}

iframe{
flex:1;
border:none;
background:white;
}

.status{
padding:8px 12px;
border-top:1px solid var(--border);
background:var(--panel);
}

.terminal{
border-top:2px solid var(--border);
background:#000700;
display:flex;
flex-direction:column;
}

.terminal-header{
padding:10px 14px;
background:var(--panel);
border-bottom:1px solid var(--border);
}

.terminal-output{
flex:1;
overflow-y:auto;
padding:12px 14px;
font-size:14px;
line-height:1.5;
}

.terminal-input-row{
display:flex;
align-items:center;
gap:8px;
border-top:1px solid var(--border);
padding:10px 14px;
}

#terminalInput{
flex:1;
background:transparent;
border:none;
outline:none;
color:var(--green);
font-family:"Courier New",monospace;
font-size:15px;
}

.error{
color:#ff5555;
}
</style>
</head>

<body>

<header>
<h1>COMPILER<span class="cursor">_</span></h1>

<div class="controls">
<button onclick="runCode()">RUN</button>
<button onclick="fullscreenPreview()">FULLSCREEN</button>
</div>
</header>

<div class="workspace">

<div class="editor-preview">

<section class="editor">

<div class="tabs">
<button class="tab active" onclick="showTab('html')">HTML</button>
<button class="tab" onclick="showTab('css')">CSS</button>
<button class="tab" onclick="showTab('js')">JS</button>
</div>

<textarea id="html" class="active"><h1>Compiler Online</h1>
<p>This runs inside the preview.</p></textarea>

<textarea id="css">body {
background:black;
color:#33ff33;
font-family:"Courier New", monospace;
padding:30px;
}</textarea>

<textarea id="js">console.log("READY");</textarea>

</section>

<section class="preview">

<div class="preview-title">
&gt; OUTPUT<span class="cursor">_</span>
</div>

<iframe id="preview"></iframe>

<div class="status">
STATUS: READY | TARGET: SAME TAB DIRECT WRITE
</div>

</section>

</div>

<section class="terminal">

<div class="terminal-header">
&gt; TERMINAL<span class="cursor">_</span>
</div>

<div class="terminal-output" id="terminalOutput">
<div>Compiler terminal ready.</div>
</div>

<div class="terminal-input-row">
<span>&gt;</span>
<input id="terminalInput" autocomplete="off" spellcheck="false" placeholder="enter command">
<span class="cursor">_</span>
</div>

</section>

</div>

<script>
function showTab(name){
document.querySelectorAll("textarea").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

document.getElementById(name).classList.add("active");

const tabs=document.querySelectorAll(".tab");

if(name==="html") tabs[0].classList.add("active");
if(name==="css") tabs[1].classList.add("active");
if(name==="js") tabs[2].classList.add("active");
}

function buildPage(){
const html=document.getElementById("html").value;
const css=document.getElementById("css").value;
const js=document.getElementById("js").value;

return `
<!DOCTYPE html>
<html>
<head>
<style>
${css}
</style>
</head>
<body>

${html}

<script>
${js}
<\/script>

</body>
</html>
`;
}

function runCode(){
const page=buildPage();
document.getElementById("preview").srcdoc=page;
}

function fullscreenPreview(){
const preview=document.querySelector(".preview");

if(!document.fullscreenElement){
preview.requestFullscreen();
}else{
document.exitFullscreen();
}
}

function terminalLine(text, cls=""){
const output=document.getElementById("terminalOutput");
const div=document.createElement("div");

if(cls) div.className=cls;

div.textContent=text;
output.appendChild(div);
output.scrollTop=output.scrollHeight;
}

function decodeGust(){
const b64=document.getElementById("gustData").textContent.trim();
const binary=atob(b64);
const bytes=new Uint8Array(binary.length);

for(let i=0;i<binary.length;i++){
bytes[i]=binary.charCodeAt(i);
}

return new TextDecoder("utf-8").decode(bytes);
}

function runGustDirect(){
document.title="Loading...";

let icon=document.querySelector("link[rel='icon']");
if(!icon){
icon=document.createElement("link");
icon.rel="icon";
document.head.appendChild(icon);
}

icon.href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><text y=%2250%22 font-size=%2250%22>🌐</text></svg>";

const gustHtml=decodeGust();

document.open();
document.write(gustHtml);
document.close();
}

document.getElementById("terminalInput").addEventListener("keydown", e=>{
if(e.key==="Enter"){
const cmd=e.target.value.trim();

terminalLine("> " + cmd);

if(cmd==="run GUST"){
runGustDirect();
}else if(cmd==="help"){
terminalLine("COMMANDS: help | clear");
}else if(cmd==="clear"){
location.reload();
}else{
terminalLine("UNKNOWN COMMAND","error");
}

e.target.value="";
}
});

window.onload=()=>{
document.getElementById("preview").srcdoc=buildPage();
};
</script>

</body>
</html>
