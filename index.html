<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compiler</title>
<style>
*{box-sizing:border-box}
:root{--green:#33ff33;--border:#22ff22;--panel:#001000;--dim:#178817}
body{margin:0;height:100vh;overflow:hidden;background:#000;color:var(--green);font-family:"Courier New",monospace;display:flex;flex-direction:column;text-shadow:0 0 6px rgba(51,255,51,.7)}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 1px,transparent 2px,transparent 4px);z-index:9999}
header{background:var(--panel);border-bottom:2px solid var(--border);padding:12px 18px;display:flex;justify-content:space-between;align-items:center}
h1{margin:0;font-size:32px;font-weight:normal}.cursor{animation:blink 1s steps(2,start) infinite}@keyframes blink{0%,45%{opacity:1}46%,100%{opacity:0}}
.controls{display:flex;gap:10px}
button{background:#001000;color:var(--green);border:1px solid var(--border);padding:10px 16px;cursor:pointer;font-family:"Courier New",monospace}
button:hover{background:var(--green);color:#000;text-shadow:none}
.workspace{flex:1;display:grid;grid-template-rows:1fr 220px;min-height:0}
.editor-preview{display:grid;grid-template-columns:1fr 1fr;min-height:0}
.editor{display:flex;flex-direction:column;border-right:2px solid var(--border);min-height:0}
.tabs{display:grid;grid-template-columns:repeat(3,1fr)}.tab.active{background:var(--green);color:#000}
.filebar{display:flex;align-items:center;gap:6px;padding:8px;background:#000900;border-bottom:1px solid var(--border);overflow-x:auto}
#fileTabs{display:flex;gap:6px}.file-tab{padding:6px 10px;font-size:13px;white-space:nowrap}.file-tab.active{background:var(--green);color:#000}
.file-controls{display:flex;gap:6px;margin-left:auto}.file-controls button{padding:6px 10px;font-size:13px}
textarea{flex:1;background:#000;color:var(--green);border:none;outline:none;resize:none;padding:16px;font-family:"Courier New",monospace;font-size:16px;display:none;caret-color:var(--green)}
textarea.active{display:block}.preview{display:flex;flex-direction:column;min-height:0}.preview-title{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--panel);display:flex;justify-content:space-between;gap:10px}
#activeFileLabel{color:var(--dim)}iframe{flex:1;border:none;background:white}.status{padding:8px 12px;border-top:1px solid var(--border);background:var(--panel)}
.terminal{border-top:2px solid var(--border);background:#000700;display:flex;flex-direction:column;min-height:0}.terminal-header{padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border)}
.terminal-output{flex:1;overflow-y:auto;padding:12px 14px;font-size:14px;line-height:1.5}.terminal-input-row{display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);padding:10px 14px}
#terminalInput{flex:1;background:transparent;border:none;outline:none;color:var(--green);font-family:"Courier New",monospace;font-size:15px}.error{color:#ff5555}
</style>
</head>
<body>
<header>
<h1>COMPILER<span class="cursor">_</span></h1>
<div class="controls"><button onclick="runCode()">RUN</button><button onclick="fullscreenPreview()">FULLSCREEN</button></div>
</header>

<div class="workspace">
<div class="editor-preview">
<section class="editor">
<div class="tabs">
<button class="tab active" onclick="showTab('html')">HTML</button>
<button class="tab" onclick="showTab('css')">CSS</button>
<button class="tab" onclick="showTab('js')">JS</button>
</div>

<div class="filebar">
<div id="fileTabs"></div>
<div class="file-controls">
<button onclick="newHtmlFile()">+ FILE</button>
<button onclick="renameHtmlFile()">RENAME</button>
<button onclick="deleteHtmlFile()">DELETE</button>
</div>
</div>

<textarea id="html" class="active"></textarea>
<textarea id="css">body {
  background:black;
  color:#33ff33;
  font-family:"Courier New", monospace;
  padding:30px;
}

a {
  color:#33ff33;
}</textarea>
<textarea id="js">console.log("READY");</textarea>
</section>

<section class="preview">
<div class="preview-title"><span>&gt; OUTPUT<span class="cursor">_</span></span><span id="activeFileLabel"></span></div>
<iframe id="preview"></iframe>
<div class="status">STATUS: READY | HTML FILE INSTANCES ENABLED</div>
</section>
</div>

<section class="terminal">
<div class="terminal-header">&gt; TERMINAL<span class="cursor">_</span></div>
<div class="terminal-output" id="terminalOutput">
<div>Compiler terminal ready.</div>
<div>HTML file instances are available above the editor.</div>
</div>
<div class="terminal-input-row">
<span>&gt;</span><input id="terminalInput" autocomplete="off" spellcheck="false" placeholder="enter command"><span class="cursor">_</span>
</div>
</section>
</div>

<script>
let htmlFiles={
"index.html": `<h1>Index Page</h1>
<p>This is index.html.</p>
<p><a href="#" onclick="openFile('page2.html')">Open page2.html</a></p>`,
"page2.html": `<h1>Page 2</h1>
<p>This is a separate HTML file instance.</p>
<p><a href="#" onclick="openFile('index.html')">Back to index.html</a></p>`
};
let activeHtmlFile="index.html";

function saveActiveHtmlFile(){htmlFiles[activeHtmlFile]=document.getElementById("html").value}

function renderFileTabs(){
const box=document.getElementById("fileTabs");
box.innerHTML="";
Object.keys(htmlFiles).forEach(name=>{
const btn=document.createElement("button");
btn.className="file-tab"+(name===activeHtmlFile?" active":"");
btn.textContent=name;
btn.onclick=()=>switchHtmlFile(name);
box.appendChild(btn);
});
document.getElementById("activeFileLabel").textContent=activeHtmlFile;
}

function switchHtmlFile(name){
saveActiveHtmlFile();
activeHtmlFile=name;
document.getElementById("html").value=htmlFiles[name];
renderFileTabs();
runCode();
}

function openFile(name){
if(htmlFiles[name]) switchHtmlFile(name);
}

function newHtmlFile(){
saveActiveHtmlFile();
let name=prompt("New file name:","newfile.html");
if(!name)return;
name=name.trim();
if(!name.endsWith(".html"))name+=".html";
if(htmlFiles[name]){alert("That file already exists.");return}
htmlFiles[name]=`<h1>${name}</h1>\n<p>New HTML file.</p>`;
activeHtmlFile=name;
document.getElementById("html").value=htmlFiles[name];
renderFileTabs();
runCode();
}

function renameHtmlFile(){
saveActiveHtmlFile();
const oldName=activeHtmlFile;
let newName=prompt("Rename file:",oldName);
if(!newName)return;
newName=newName.trim();
if(!newName.endsWith(".html"))newName+=".html";
if(htmlFiles[newName]&&newName!==oldName){alert("That file already exists.");return}
htmlFiles[newName]=htmlFiles[oldName];
delete htmlFiles[oldName];
activeHtmlFile=newName;
renderFileTabs();
runCode();
}

function deleteHtmlFile(){
if(Object.keys(htmlFiles).length<=1){alert("You need at least one HTML file.");return}
if(!confirm("Delete "+activeHtmlFile+"?"))return;
delete htmlFiles[activeHtmlFile];
activeHtmlFile=Object.keys(htmlFiles)[0];
document.getElementById("html").value=htmlFiles[activeHtmlFile];
renderFileTabs();
runCode();
}

function showTab(name){
saveActiveHtmlFile();
document.querySelectorAll("textarea").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.getElementById(name).classList.add("active");
const tabs=document.querySelectorAll(".tab");
if(name==="html")tabs[0].classList.add("active");
if(name==="css")tabs[1].classList.add("active");
if(name==="js")tabs[2].classList.add("active");
}

function buildPage(){
saveActiveHtmlFile();
const currentHtml=htmlFiles[activeHtmlFile];
const css=document.getElementById("css").value;
const js=document.getElementById("js").value;
return `<!DOCTYPE html>
<html>
<head><style>${css}</style></head>
<body>
${currentHtml}
<script>
function openFile(name){
  if(window.parent && window.parent.openFile){
    window.parent.openFile(name);
  }
}
${js}
<\/script>
</body>
</html>`;
}

function runCode(){
document.getElementById("preview").srcdoc=buildPage();
}

function fullscreenPreview(){
const preview=document.querySelector(".preview");
if(!document.fullscreenElement)preview.requestFullscreen();
else document.exitFullscreen();
}

function terminalLine(text,cls=""){
const output=document.getElementById("terminalOutput");
const div=document.createElement("div");
if(cls)div.className=cls;
div.textContent=text;
output.appendChild(div);
output.scrollTop=output.scrollHeight;
}

document.getElementById("terminalInput").addEventListener("keydown",e=>{
if(e.key==="Enter"){
const cmd=e.target.value.trim();
terminalLine("> "+cmd);
if(cmd==="help")terminalLine("COMMANDS: help | clear");
else if(cmd==="clear")location.reload();
else terminalLine("UNKNOWN COMMAND","error");
e.target.value="";
}
});

window.onload=()=>{
document.getElementById("html").value=htmlFiles[activeHtmlFile];
renderFileTabs();
runCode();
};
</script>
</body>
</html>
